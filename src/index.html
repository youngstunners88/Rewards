<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rewards — Classroom Point Tracker</title>
    <link rel="stylesheet" href="./style.css?v=6" />
  </head>
  <body>
    <main id="app">
      <header class="app-header">
        <h1>⭐ Rewards</h1>
        <div class="header-actions">
          <button id="calendar-btn" class="btn btn-ghost" type="button" aria-label="Open class history">📅 History</button>
          <button id="settings-btn" class="btn btn-ghost" type="button">⚙ Settings</button>
        </div>
      </header>

      <section class="class-picker-wrap" aria-label="Choose class">
        <div id="class-picker" class="class-picker"></div>
      </section>

      <section class="date-bar" aria-label="Today">
        <span id="today-label" class="today-label"></span>
      </section>

      <section class="reward-bar" aria-label="Give points">
        <span class="reward-label">Give points:</span>
        <button class="btn btn-point" data-action="+1" type="button" disabled>+1 point</button>
        <button class="btn btn-point" data-action="+2" type="button" disabled>+2 points</button>
        <button class="btn btn-point" data-action="+3" type="button" disabled>+3 points</button>
        <button class="btn btn-sad" data-action="sad" type="button" disabled>☹ Sad face</button>
      </section>

      <section aria-label="Students">
        <div id="student-grid" class="student-grid"></div>
      </section>

      <section class="leaderboard-wrap" aria-label="Leaderboard">
        <div class="leaderboard-head">
          <h2>🏆 Leaderboard — <span id="leaderboard-scope-label">Today</span></h2>
          <button id="leaderboard-toggle" class="btn btn-ghost btn-sm" type="button">Show all-time</button>
        </div>
        <ol id="leaderboard" class="leaderboard"></ol>
      </section>

      <section class="test-scores-wrap" aria-label="Test scores">
        <div class="leaderboard-head">
          <h2>🧪 Test Scores</h2>
          <button id="add-test-score-btn" class="btn btn-ghost btn-sm" type="button">+ Add score</button>
        </div>
        <ul id="test-scores-list" class="test-scores-list"></ul>
      </section>
    </main>

    <script src="./students.js?v=6"></script>
    <script src="./avatars.js?v=6"></script>
    <script src="./reactions.js?v=6"></script>
    <script src="./script.js?v=6"></script>
  </body>
</html>
